        const quizContainer = document.getElementById('quiz-container');

        function cargarQuiz() {
            preguntasQuiz.forEach((q, index) => {
                const preguntaDiv = document.createElement('div');
                preguntaDiv.classList.add('pregunta-container');

                const preguntaTexto = document.createElement('div');
                preguntaTexto.classList.add('pregunta-texto');
                preguntaTexto.innerHTML = q.pregunta;
                preguntaDiv.appendChild(preguntaTexto);

                q.opciones.forEach((opcion, i) => {
                    const label = document.createElement('label');
                    label.classList.add('opcion-label');
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `pregunta_${q.id}`;
                    radio.value = i;

                    label.appendChild(radio);
                    label.innerHTML += ` ${opcion}`;
                    preguntaDiv.appendChild(label);
                });

                quizContainer.appendChild(preguntaDiv);
            });
            
            // Si MathJax ya está cargado, forzar renderizado de las ecuaciones añadidas
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function evaluarQuiz() {
            let puntaje = 0;
            let contestadas = 0;
            const totalPreguntas = preguntasQuiz.length;

            // 1. Evaluar y bloquear inputs
            preguntasQuiz.forEach(q => {
                const seleccion = document.querySelector(`input[name="pregunta_${q.id}"]:checked`);
                const radios = document.querySelectorAll(`input[name="pregunta_${q.id}"]`);
                
                if (seleccion) {
                    contestadas++;
                    if (parseInt(seleccion.value) === q.respuestaCorrecta) {
                        puntaje++;
                    }
                }
                // Bloquea los radio buttons para que no modifiquen respuestas
                radios.forEach(r => r.disabled = true);
            });

            // 2. Mostrar Modal
            const modal = document.getElementById('resultado-modal');
            const titulo = document.getElementById('modal-titulo');
            const cuerpo = document.getElementById('modal-cuerpo');

            if (contestadas < totalPreguntas) {
                alert("⚠️ Por favor, responde todas las preguntas antes de evaluar.");
                // Desbloqueamos si no se contestaron todas
                document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = false);
                return;
            }

            const calificacionBase10 = ((puntaje / totalPreguntas) * 10).toFixed(1);
            
            titulo.innerText = "Calificación";
            cuerpo.innerHTML = `Aciertos: ${puntaje} / ${totalPreguntas}<br><strong>Calificación: ${calificacionBase10} / 10.0</strong>`;
            
            modal.style.display = 'flex';
        }

            const btnPrincipal = document.querySelector('.ejercicio-box .btn-evaluar');
            btnPrincipal.innerText = "Mostrar/Ocultar Respuestas";
            btnPrincipal.onclick = toggleRespuestas;
            
            // 3. Ejecuta la función por primera vez para revelar las respuestas
            toggleRespuestas();
        }

        function toggleRespuestas() {
            preguntasQuiz.forEach(q => {
                const radios = document.querySelectorAll(`input[name="pregunta_${q.id}"]`);
                radios.forEach((radio, index) => {
                    const parentLabel = radio.parentElement;
                    
                    if (index === q.respuestaCorrecta) {
                        // Lógica de alternancia (toggle) para la respuesta correcta
                        const bgColor = window.getComputedStyle(parentLabel).backgroundColor;
                        if (bgColor === 'rgb(212, 175, 55)' || parentLabel.style.backgroundColor === '#D4AF37') {
                            parentLabel.style.backgroundColor = '';
                            parentLabel.style.fontWeight = 'normal';
                        } else {
                            parentLabel.style.backgroundColor = '#D4AF37'; 
                            parentLabel.style.fontWeight = 'bold';
                        }
                    } else if (radio.checked) {
                        // Lógica de alternancia para indicar un error del estudiante
                        const bgColor = window.getComputedStyle(parentLabel).backgroundColor;
                        if (bgColor === 'rgb(255, 204, 204)' || parentLabel.style.backgroundColor === 'rgb(255, 204, 204)') {
                            parentLabel.style.backgroundColor = '';
                        } else {
                            parentLabel.style.backgroundColor = 'rgb(255, 204, 204)'; 
                        }
                    }
                });
            });
        }
        
    </script>

 <div id="resultado-modal" class="modal-overlay">
        <div class="modal-content">
            <h1 id="modal-titulo"></h1>
            <p id="modal-cuerpo" style="font-size: 24px; margin: 20px 0;"></p>
            
            <button class="btn-evaluar" onclick="cerrarModalYVerRespuestas()">Mostrar/Ocultar Respuestas</button>
            
            <button class="btn-evaluar" onclick="location.reload()" style="background-color: #666; border-color: #444; margin-top: 10px;">Recargar para intentar de nuevo</button>
        </div>
    </div>

</body>
</html>
